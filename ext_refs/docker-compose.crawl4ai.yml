services:
  crawl4ai-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: crawl4ai-mcp:latest
    ports:
      - "8080:8080"
    volumes:
      - ./crawls:/app/crawls
    environment:
      - CRAWL4AI_MCP_LOG=INFO
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=8080
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    networks:
      - crawl4ai-network

networks:
  crawl4ai-network:
    driver: bridge
