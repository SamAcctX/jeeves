general:
  debug: false
  instance_name: "SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: false
  secret_key: "jeeves-searxng-private-instance"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

outgoing:
  request_timeout: 5.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    time_range_support: true
    paging: true

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    categories: [general]

  - name: wikidata
    engine: wikidata
    shortcut: wd
    timeout: 3.0
    weight: 2
    categories: [general]

  - name: github
    engine: github
    shortcut: gh

  - name: stackoverflow
    engine: stackexchange
    shortcut: st
    api_site: "stackoverflow"
    categories: [it, q&a]

  - name: google
    engine: google
    shortcut: go
    disabled: true

  - name: google images
    engine: google_images
    shortcut: goi
    disabled: true

  - name: google news
    engine: google_news
    shortcut: gon
    disabled: true

  - name: google videos
    engine: google_videos
    shortcut: gov
    disabled: true

  - name: google scholar
    engine: google_scholar
    shortcut: gos
    disabled: true

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: true

  - name: qwant
    engine: qwant
    qwant_categ: web
    shortcut: qw
    disabled: true

  - name: yandex
    engine: yandex
    shortcut: yd
    disabled: true
